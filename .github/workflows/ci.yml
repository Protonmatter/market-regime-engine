name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    name: Validate runner and package version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Minimal validation
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -c "import market_regime_engine as m; assert m.__version__ == '1.6.0', m.__version__"
          test "$(mre --version | head -n1)" = "1.6.0"
