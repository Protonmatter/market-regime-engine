name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    name: Validate package, tests, lint, and security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev,analytics]"
          python -m pip install "ruff>=0.4" "bandit>=1.7" "pip-licenses>=4.0" "cyclonedx-bom>=4.0"

      - name: Version sanity
        run: |
          PYPROJECT_VERSION=$(python -c "import re; t=open('pyproject.toml',encoding='utf-8').read(); m=re.search(r'^\[project\][\s\S]*?^version\s*=\s*\"([^\"]+)\"', t, re.MULTILINE); print(m.group(1) if m else '')")
          INIT_VERSION=$(python -c "import re; t=open('src/market_regime_engine/__init__.py',encoding='utf-8').read(); m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', t); print(m.group(1) if m else '')")
          CLI_VERSION=$(mre --version | head -n1)
          README_VERSION=$(python -c "import re; t=open('README.md',encoding='utf-8').read(); m=re.search(r'^# Market Regime Engine v(\d+\.\d+\.\d+)\b', t, re.MULTILINE); print(m.group(1) if m else '')")
          test "$PYPROJECT_VERSION" = "$INIT_VERSION"
          test "$CLI_VERSION" = "$PYPROJECT_VERSION"
          test "$README_VERSION" = "$PYPROJECT_VERSION"

      - name: Ruff check
        run: ruff check src tests

      - name: Focused v1.5/v1.6 tests
        run: |
          pytest tests/test_v1_5_production.py \
            tests/test_v1_5_adapters.py \
            tests/test_v1_5_validation_pack.py \
            tests/test_v1_6_overfit_control.py \
            tests/test_v1_6_online_conformal.py -q

      - name: Full non-slow tests
        run: pytest tests/ -q --maxfail=5 --durations=10 -m "not slow"
        env:
          PYTHONHASHSEED: "0"

      - name: Build wheel and sdist
        run: python -m build

      - name: Package metadata sanity
        run: |
          python -m venv .smoke-venv
          .smoke-venv/bin/python -m pip install --upgrade pip
          .smoke-venv/bin/python -m pip install dist/market_regime_engine-*.whl
          .smoke-venv/bin/python -m pip install pytest
          MRE_WHEEL_METADATA_TEST=1 .smoke-venv/bin/python -m pytest tests/test_package_metadata.py tests/test_wheel_metadata_sanity.py -q

      - name: Bandit high-severity scan
        run: bandit -r src/market_regime_engine --severity-level high

      - name: License audit
        run: |
          pip-licenses --format=json > licenses.json
          python - <<'PY'
          import json, sys
          deny = {"GPL", "GPL-2.0", "GPL-3.0", "LGPL", "LGPL-2.1", "LGPL-3.0", "AGPL", "AGPL-3.0"}
          data = json.load(open("licenses.json", "r", encoding="utf-8"))
          bad = []
          for pkg in data:
              lic = (pkg.get("License") or "").strip()
              tokens = {x.strip() for x in lic.replace(";", ",").split(",") if x.strip()}
              if tokens & deny:
                  bad.append((pkg.get("Name"), lic))
          if bad:
              print(bad, file=sys.stderr)
              sys.exit(1)
          PY

      - name: SBOM generation
        run: cyclonedx-py environment -o sbom.json
