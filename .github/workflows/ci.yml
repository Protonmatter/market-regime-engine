name: CI

on:
  push:
    branches: [main, master, v1.1-fixes]
    tags: ["v*"]
  pull_request:
    branches: [main, master, v1.1-fixes]
  workflow_dispatch:

jobs:
  version-sanity:
    name: Version sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Compare versions
        shell: bash
        run: |
          set -euo pipefail
          PYPROJECT_VERSION=$(python -c "import re; t=open('pyproject.toml',encoding='utf-8').read(); m=re.search(r'^\[project\][\s\S]*?^version\s*=\s*\"([^\"]+)\"', t, re.MULTILINE); print(m.group(1) if m else '')")
          INIT_VERSION=$(python -c "import re; t=open('src/market_regime_engine/__init__.py',encoding='utf-8').read(); m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', t); print(m.group(1) if m else '')")
          CLI_VERSION=$(mre --version | head -n1)
          README_VERSION=$(python -c "import re; t=open('README.md',encoding='utf-8').read(); m=re.search(r'^# Market Regime Engine v(\d+\.\d+\.\d+)\b', t, re.MULTILINE); print(m.group(1) if m else '')")
          test "${PYPROJECT_VERSION}" = "${INIT_VERSION}"
          test "${CLI_VERSION}" = "${PYPROJECT_VERSION}"
          test "${README_VERSION}" = "${PYPROJECT_VERSION}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            test "${{ github.ref_name }}" = "v${PYPROJECT_VERSION}"
          fi
      - name: Run README + version sanity tests
        run: |
          pip install pytest
          pytest tests/test_version_sanity.py tests/test_readme_version_sanity.py -q

  lockfile-sanity:
    name: Lockfile sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid editable / local-path lines in every lockfile
        shell: bash
        run: |
          set -euo pipefail
          LOCKS=(requirements-lock.txt requirements-lock.core.txt requirements-lock.frontier-cpu-linux.txt requirements-lock.bayesian-cpu-linux.txt requirements-lock.dashboard.txt)
          BAD=0
          for f in "${LOCKS[@]}"; do
            if [ ! -f "$f" ]; then echo "FAIL: $f missing" >&2; BAD=1; continue; fi
            NONCOMMENT=$(grep -v '^[[:space:]]*#' "$f")
            if echo "${NONCOMMENT}" | grep -nE '^-e ' >/dev/null; then echo "FAIL: editable install line found in $f" >&2; BAD=1; fi
            if echo "${NONCOMMENT}" | grep -niE '(^|[^[:alnum:]])(c:\\|/Users/|/home/|file://)' >/dev/null; then echo "FAIL: local-path leak found in $f" >&2; BAD=1; fi
          done
          exit "${BAD}"

  lockfile-platform-sanity:
    name: Lockfile platform sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify platform lockfile hashes
        shell: bash
        run: |
          set -euo pipefail
          declare -a LOCKS=("requirements-lock.core" "requirements-lock.frontier-cpu-linux" "requirements-lock.bayesian-cpu-linux" "requirements-lock.dashboard")
          for stem in "${LOCKS[@]}"; do
            txt="${stem}.txt"; hash="${stem}.hash"
            test -f "$txt"
            test -f "$hash"
            EXPECTED=$(cut -d' ' -f1 "$hash")
            ACTUAL=$(sha256sum "$txt" | cut -d' ' -f1)
            test "$EXPECTED" = "$ACTUAL"
          done
          diff -q requirements-lock.txt requirements-lock.core.txt >/dev/null

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.4"
      - name: ruff check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts
          ruff check src tests --output-format=json > .ci-artifacts/ruff-results.json || true
          ruff check src tests
      - name: ruff format advisory
        shell: bash
        run: |
          ruff format --check src tests || echo "ruff format advisory: existing formatting drift detected"
      - name: Upload ruff JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-results
          path: .ci-artifacts/ruff-results.json
          retention-days: 14

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install -e ".[dev,analytics]"
          pip install pytest-xdist hypothesis
      - name: Test
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          pytest tests/ -q -n auto --maxfail=5 --durations=10 -m "not slow" --junitxml=.ci-artifacts/test-results.xml --cov=src/market_regime_engine --cov-report=xml:.ci-artifacts/coverage.xml
        env:
          PYTHONHASHSEED: "0"
      - name: Upload junit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: .ci-artifacts/test-results.xml
          retention-days: 14
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: .ci-artifacts/coverage.xml
          retention-days: 14

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run mypy
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          mypy src/market_regime_engine --output json > .ci-artifacts/mypy-results.json 2> .ci-artifacts/mypy-results.txt || cp .ci-artifacts/mypy-results.txt .ci-artifacts/mypy-results.json
      - name: Upload mypy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-results
          path: |
            .ci-artifacts/mypy-results.json
            .ci-artifacts/mypy-results.txt
          retention-days: 14

  golden-trace:
    name: Golden trace regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,analytics]"
      - run: pytest tests/test_golden_trace.py -q
        env:
          PYTHONHASHSEED: "0"

  bench:
    name: Bench (BOCPD/WFST/PSI)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[analytics]"
      - name: Run bench
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          mre bench --out .ci-artifacts/bench.csv || echo "bench skipped: $?"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results
          path: .ci-artifacts/bench.csv
          retention-days: 14
          if-no-files-found: warn

  package-sanity:
    name: Package sanity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build artifacts
        shell: bash
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python scripts/build_audit_zip.py
      - name: Audit zip size budget assertion
        shell: bash
        run: |
          ZIP=$(ls dist/market-regime-engine-*-source.zip | head -n1)
          BYTES=$(wc -c < "${ZIP}")
          test "${BYTES}" -le $((5 * 1024 * 1024))
      - name: Wheel install and metadata tests
        shell: bash
        run: |
          python -m venv .smoke-venv
          if [ "${{ runner.os }}" = "Windows" ]; then VENV_PY=".smoke-venv/Scripts/python.exe"; else VENV_PY=".smoke-venv/bin/python"; fi
          "${VENV_PY}" -m pip install --upgrade pip
          "${VENV_PY}" -m pip install dist/market_regime_engine-*.whl
          "${VENV_PY}" -m pip install pytest
          mkdir -p "${RUNNER_TEMP:-/tmp}/pkg-sanity"
          TARGET="${RUNNER_TEMP:-/tmp}/pkg-sanity"
          cp -R tests "${TARGET}/tests"
          cd "${TARGET}"
          "${VENV_PY}" -m pytest tests/test_package_metadata.py tests/test_wheel_metadata_sanity.py -q

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate SBOM
        shell: bash
        run: |
          pip install -e .
          pip install "cyclonedx-bom>=4.0"
          mkdir -p .ci-artifacts
          cyclonedx-py environment -o .ci-artifacts/sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: .ci-artifacts/sbom.json
          retention-days: 30

  license-audit:
    name: License audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run pip-licenses
        shell: bash
        env:
          LICENSE_DENY_LIST: "GPL,GPL-2.0,GPL-3.0,LGPL,LGPL-2.1,LGPL-3.0,AGPL,AGPL-3.0"
        run: |
          set -euo pipefail
          pip install -e .
          pip install "pip-licenses>=4.0"
          mkdir -p .ci-artifacts
          pip-licenses --format=json > .ci-artifacts/licenses.json
          python - <<'PY'
          import json, os, sys
          deny = {x.strip() for x in os.environ.get('LICENSE_DENY_LIST', '').split(',') if x.strip()}
          data = json.load(open('.ci-artifacts/licenses.json', 'r', encoding='utf-8'))
          violators = []
          for pkg in data:
              lic = (pkg.get('License') or '').strip()
              for token in lic.replace(';', ',').split(','):
                  if token.strip() in deny:
                      violators.append((pkg.get('Name'), lic))
                      break
          if violators:
              print('FAIL: license deny-list violations:', file=sys.stderr)
              for name, lic in violators:
                  print(f'  {name}: {lic}', file=sys.stderr)
              sys.exit(1)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: license-audit
          path: .ci-artifacts/licenses.json
          retention-days: 30

  bandit-scan:
    name: Bandit static security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run bandit
        shell: bash
        run: |
          pip install "bandit>=1.7"
          mkdir -p .ci-artifacts
          bandit -r src/market_regime_engine -f json -o .ci-artifacts/bandit.json --severity-level high || true
          python - <<'PY'
          import json, sys
          data = json.load(open('.ci-artifacts/bandit.json', 'r', encoding='utf-8'))
          highs = [r for r in data.get('results', []) if r.get('issue_severity', '').upper() == 'HIGH']
          if highs:
              print(f'FAIL: {len(highs)} HIGH-severity bandit findings:', file=sys.stderr)
              sys.exit(1)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: bandit
          path: .ci-artifacts/bandit.json
          retention-days: 30

  rust-wheels:
    name: Rust extension wheel advisory (${{ matrix.os }} cp${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: pip install "maturin>=1.5"
      - name: Build the Rust wheel advisory
        shell: bash
        working-directory: rust_ext
        run: |
          maturin build --release --out ../dist || echo "Rust extension wheel build advisory failure"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-wheel-${{ matrix.os }}-cp${{ matrix.python-version }}
          path: dist/mre_rust_ext-*.whl
          retention-days: 30
          if-no-files-found: warn

  smoke:
    name: Smoke (sample → audit → score → verify-run)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[analytics]"
      - name: End-to-end smoke
        shell: bash
        run: |
          mkdir -p data
          mre bootstrap-sample --db data/mre.db
          mre seed-vintage-from-observations --db data/mre.db
          mre materialize-asof-features --db data/mre.db --write-features
          mre audit-vintage --db data/mre.db --enforce
          mre build-features --db data/mre.db
          mre score-regime --db data/mre.db
          mre label-recessions --db data/mre.db
          mre train-baseline --db data/mre.db
          mre validate --db data/mre.db --out data/validation --min-train 60 --step 6
          mre calibrate-probabilities --db data/mre.db --validation-dir data/validation
          mre score-confidence --db data/mre.db --validation-dir data/validation
          mre release-gate --db data/mre.db --validation-dir data/validation
          mre model-run --db data/mre.db --purpose "v1.6.0 CI smoke"
          mre verify-run --db data/mre.db
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-db
          path: data/mre.db
          retention-days: 7
