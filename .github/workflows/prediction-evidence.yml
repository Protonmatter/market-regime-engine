name: Prediction Evidence

on:
  pull_request:
    branches: [main, master]
    paths:
      - "src/market_regime_engine/prediction_evidence*.py"
      - "scripts/run_prediction_benchmark.py"
      - "tests/fixtures/prediction_evidence/**"
      - "tests/test_prediction_evidence.py"
      - ".github/workflows/prediction-evidence.yml"
      - "docs/SOTA_PREDICTION_ENGINE_BLUEPRINT.md"
      - "docs/VALIDATION_REPORT_TEMPLATE.md"
      - "docs/IMPLEMENTATION_PLAN_FROM_FINDINGS.md"
  push:
    branches: [main, master, p0-prediction-evidence-ci]
    paths:
      - "src/market_regime_engine/prediction_evidence*.py"
      - "scripts/run_prediction_benchmark.py"
      - "tests/fixtures/prediction_evidence/**"
      - "tests/test_prediction_evidence.py"
      - ".github/workflows/prediction-evidence.yml"
      - "docs/SOTA_PREDICTION_ENGINE_BLUEPRINT.md"
      - "docs/VALIDATION_REPORT_TEMPLATE.md"
      - "docs/IMPLEMENTATION_PLAN_FROM_FINDINGS.md"
  workflow_dispatch:

jobs:
  prediction-evidence:
    name: Evidence harness pass/fail contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Good fixture must pass
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts/prediction-evidence/good
          mre-prediction-evidence \
            --binary tests/fixtures/prediction_evidence/binary_oos_good.csv \
            --quantile tests/fixtures/prediction_evidence/quantile_oos_good.csv \
            --out-json .ci-artifacts/prediction-evidence/good/prediction_evidence.json \
            --out-md .ci-artifacts/prediction-evidence/good/PREDICTION_EVIDENCE.md \
            --fail-on-hold

      - name: Bad binary calibration fixture must fail
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts/prediction-evidence/bad-binary
          set +e
          mre-prediction-evidence \
            --binary tests/fixtures/prediction_evidence/binary_oos_bad_calibration.csv \
            --out-json .ci-artifacts/prediction-evidence/bad-binary/prediction_evidence.json \
            --out-md .ci-artifacts/prediction-evidence/bad-binary/PREDICTION_EVIDENCE.md \
            --fail-on-hold
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: bad binary calibration fixture unexpectedly passed" >&2
            exit 1
          fi
          echo "OK: bad binary calibration fixture failed with exit code $rc"

      - name: Bad quantile coverage fixture must fail
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts/prediction-evidence/bad-quantile
          set +e
          mre-prediction-evidence \
            --quantile tests/fixtures/prediction_evidence/quantile_oos_bad_coverage.csv \
            --out-json .ci-artifacts/prediction-evidence/bad-quantile/prediction_evidence.json \
            --out-md .ci-artifacts/prediction-evidence/bad-quantile/PREDICTION_EVIDENCE.md \
            --fail-on-hold
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: bad quantile coverage fixture unexpectedly passed" >&2
            exit 1
          fi
          echo "OK: bad quantile coverage fixture failed with exit code $rc"

      - name: Upload prediction evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prediction-evidence-fixtures
          path: .ci-artifacts/prediction-evidence
          retention-days: 14
