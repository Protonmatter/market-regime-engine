# SIFMA U.S. bond market trading calendar (2020-2030).
#
# Source: hand-curated from
#   https://www.sifma.org/resources/general/holiday-schedule/
# Cross-checked against U.S. federal holidays + the SIFMA US fixed-income
# bond-market recommended close schedule. Early-close dates do NOT close
# the market; they are flagged separately so PIT enforcement still
# permits trade timestamps on those days.
#
# Format expected by `fixed_income.calendars`:
#   calendar: sifma_bond
#   years:
#     - year: <YYYY>
#       closures:
#         - {date: "YYYY-MM-DD", name: "..."}
#       early_closes:
#         - {date: "YYYY-MM-DD", name: "...", close_time: "HH:MM"}
#
# Notes on rules used to materialise the dates below:
# - When a federal holiday lands on a Saturday, US bond markets close
#   the preceding Friday (per SIFMA US Treasury observed rule).
# - When a federal holiday lands on a Sunday, US bond markets close the
#   following Monday.
# - Juneteenth (Jun 19) is observed only from 2022 onward.
# - Good Friday and the day before Independence Day / Christmas Eve /
#   New Year's Eve are scheduled early closes (typically 14:00 ET / 12:00
#   ET respectively) when the underlying day is a regular weekday.
calendar: sifma_bond
years:
  - year: 2020
    closures:
      - {date: "2020-01-01", name: "New Year's Day"}
      - {date: "2020-01-20", name: "Martin Luther King Jr. Day"}
      - {date: "2020-02-17", name: "Presidents' Day"}
      - {date: "2020-04-10", name: "Good Friday"}
      - {date: "2020-05-25", name: "Memorial Day"}
      - {date: "2020-07-03", name: "Independence Day (observed Fri 7/3 — Jul 4 falls on Saturday)"}
      - {date: "2020-09-07", name: "Labor Day"}
      - {date: "2020-10-12", name: "Columbus Day"}
      - {date: "2020-11-11", name: "Veterans Day"}
      - {date: "2020-11-26", name: "Thanksgiving"}
      - {date: "2020-12-25", name: "Christmas"}
    early_closes:
      - {date: "2020-04-09", name: "Day before Good Friday early close", close_time: "14:00"}
